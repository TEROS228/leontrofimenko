<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL // SYSTEM ACCESS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            position: relative;
        }

        #matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.15;
        }

        .container {
            position: relative;
            z-index: 1;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            border: 2px solid #0f0;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0%, 90%, 100% { transform: translate(0); }
            92% { transform: translate(-2px, 2px); }
            94% { transform: translate(2px, -2px); }
            96% { transform: translate(-2px, -2px); }
        }

        .terminal {
            flex: 1;
            border: 2px solid #0f0;
            padding: 20px;
            overflow-y: auto;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
            background: rgba(0, 20, 0, 0.8);
        }

        .terminal-line {
            margin: 5px 0;
            opacity: 0;
            animation: fadeIn 0.3s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .prompt {
            color: #0ff;
        }

        .command {
            color: #ff0;
        }

        .error {
            color: #f00;
        }

        .success {
            color: #0f0;
        }

        .warning {
            color: #fa0;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }

        .stat-box {
            border: 1px solid #0f0;
            padding: 10px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            border: 1px solid #0f0;
            margin-top: 10px;
            position: relative;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #0f0, #0a0);
            width: 0%;
            transition: width 0.5s;
            box-shadow: 0 0 10px #0f0;
        }

        .blink {
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50%, 100% { opacity: 1; }
            25%, 75% { opacity: 0; }
        }

        .typing::after {
            content: '▋';
            animation: blink 0.7s infinite;
        }

        #code-stream {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 100px;
            overflow: hidden;
            opacity: 0.3;
            pointer-events: none;
        }

        .code-line {
            color: #0a0;
            white-space: nowrap;
            animation: scroll 10s linear infinite;
        }

        @keyframes scroll {
            from { transform: translateX(100%); }
            to { transform: translateX(-100%); }
        }
    </style>
</head>
<body>
    <canvas id="matrix-bg"></canvas>

    <div class="container">
        <div class="header">
            <h1>▓▓▓ SECURE TERMINAL ACCESS ▓▓▓</h1>
            <p>AUTHORIZED PERSONNEL ONLY // LEON TROFIMENKO</p>
            <p id="current-time"></p>
        </div>

        <div class="terminal" id="terminal"></div>

        <div class="stats">
            <div class="stat-box">
                <div>SYSTEM STATUS</div>
                <div class="success">ONLINE</div>
            </div>
            <div class="stat-box">
                <div>SECURITY LEVEL</div>
                <div class="warning">MAXIMUM</div>
            </div>
            <div class="stat-box">
                <div>PROCESSES</div>
                <div id="process-count">0</div>
            </div>
            <div class="stat-box">
                <div>UPTIME</div>
                <div id="uptime">00:00:00</div>
            </div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progress"></div>
        </div>
    </div>

    <div id="code-stream"></div>

    <script>
        // Matrix rain effect
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()';
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0f0';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 35);

        // Terminal simulation
        const terminal = document.getElementById('terminal');
        const commands = [
            { type: 'prompt', text: 'root@leontrofimenko:~#', delay: 100 },
            { type: 'command', text: 'initializing_secure_connection...', delay: 500 },
            { type: 'success', text: '[✓] Connection established', delay: 800 },
            { type: 'success', text: '[✓] Encryption enabled: AES-256', delay: 1000 },
            { type: 'prompt', text: 'root@leontrofimenko:~#', delay: 1200 },
            { type: 'command', text: 'scanning_network_topology...', delay: 1400 },
            { type: 'success', text: '[✓] Found 247 active nodes', delay: 2000 },
            { type: 'success', text: '[✓] Firewall status: ACTIVE', delay: 2200 },
            { type: 'prompt', text: 'root@leontrofimenko:~#', delay: 2400 },
            { type: 'command', text: 'deploying_ai_algorithms...', delay: 2600 },
            { type: 'success', text: '[✓] Neural network initialized', delay: 3200 },
            { type: 'success', text: '[✓] Machine learning models loaded', delay: 3500 },
            { type: 'prompt', text: 'root@leontrofimenko:~#', delay: 3700 },
            { type: 'command', text: 'analyzing_blockchain_data...', delay: 3900 },
            { type: 'success', text: '[✓] Processing 10,000 transactions/sec', delay: 4500 },
            { type: 'prompt', text: 'root@leontrofimenko:~#', delay: 4700 },
            { type: 'command', text: 'optimizing_quantum_algorithms...', delay: 4900 },
            { type: 'success', text: '[✓] Quantum optimization complete', delay: 5500 },
            { type: 'warning', text: '[!] WARNING: Intrusion attempt detected', delay: 6000 },
            { type: 'success', text: '[✓] Threat neutralized automatically', delay: 6500 },
            { type: 'prompt', text: 'root@leontrofimenko:~#', delay: 6700 },
            { type: 'command', text: 'compiling_custom_kernel_modules...', delay: 6900 },
            { type: 'success', text: '[✓] Build successful: 0 errors, 0 warnings', delay: 7500 },
            { type: 'prompt', text: 'root@leontrofimenko:~#', delay: 7700 },
            { type: 'success', text: 'ALL SYSTEMS OPERATIONAL', delay: 8000 },
            { type: 'prompt', text: 'root@leontrofimenko:~#', delay: 8200 },
            { type: 'typing', text: 'awaiting_input...', delay: 8400 }
        ];

        let lineIndex = 0;
        function addLine() {
            if (lineIndex < commands.length) {
                const cmd = commands[lineIndex];
                setTimeout(() => {
                    const line = document.createElement('div');
                    line.className = `terminal-line ${cmd.type}`;
                    line.textContent = cmd.text;
                    terminal.appendChild(line);
                    terminal.scrollTop = terminal.scrollHeight;
                    lineIndex++;
                    addLine();
                }, cmd.delay);
            }
        }
        addLine();

        // Update time
        function updateTime() {
            const now = new Date();
            document.getElementById('current-time').textContent =
                `UTC: ${now.toISOString()} // LOCAL: ${now.toLocaleTimeString()}`;
        }
        setInterval(updateTime, 1000);
        updateTime();

        // Process counter
        let processCount = 0;
        setInterval(() => {
            processCount = Math.floor(Math.random() * 50) + 150;
            document.getElementById('process-count').textContent = processCount;
        }, 2000);

        // Uptime counter
        let seconds = 0;
        setInterval(() => {
            seconds++;
            const h = Math.floor(seconds / 3600).toString().padStart(2, '0');
            const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('uptime').textContent = `${h}:${m}:${s}`;
        }, 1000);

        // Progress bar animation
        let progress = 0;
        setInterval(() => {
            progress = (progress + Math.random() * 10) % 100;
            document.getElementById('progress').style.width = progress + '%';
        }, 500);

        // Code stream
        const codeStream = document.getElementById('code-stream');
        const codeSnippets = [
            'const exploit = await analyzeVulnerability(target);',
            'if (encryption.strength < 256) { upgrade(); }',
            'blockchain.validate(transaction) => 0x7f3a9...',
            'neural_net.train(dataset, epochs=1000);',
            'firewall.block(ip_address, reason="suspicious");',
            'quantum_compute(qubits, algorithm="shor");'
        ];

        setInterval(() => {
            const line = document.createElement('div');
            line.className = 'code-line';
            line.textContent = codeSnippets[Math.floor(Math.random() * codeSnippets.length)];
            codeStream.appendChild(line);
            setTimeout(() => line.remove(), 10000);
        }, 3000);
    </script>
</body>
</html>
